<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password – MPF</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber: #c4883a;
      --amber-light: #e8b96a;
      --amber-dark: #8a5c20;
      --warm-brown: #3a2810;
      --bark: #5c4a3a;
      --bark-light: #8a7060;
      --sage: #7a9e7e;
      --sage-dark: #4e7052;
      --cream: #faf6ef;
      --warm-white: #fffdf8;
      --border: #e8dfd4;
      --text: #2e2318;
      --text-muted: #9a8a7a;
    }

    html, body {
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: var(--warm-white);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 2.75rem 2.5rem;
      width: 100%;
      max-width: 420px;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.5s ease both;
    }

    /* Amber top accent — matches login's top stripe */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--amber-dark), var(--amber), var(--amber-light));
    }

    /* Subtle radial glow in corner */
    .card::after {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 220px; height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(196,136,58,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
      text-decoration: none;
    }

    .brand-icon { font-size: 1.15rem; }

    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.02em;
    }

    .icon-wrap {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: rgba(196,136,58,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      margin-bottom: 1.25rem;
    }

    .form-eyebrow {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 0.4rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.75rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 0.88rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--bark);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 0.45rem;
    }

    input[type="email"] {
      width: 100%;
      padding: 0.85rem 1.1rem;
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 1.35rem;
    }

    input[type="email"]:focus {
      border-color: var(--amber);
      box-shadow: 0 0 0 3px rgba(196,136,58,0.12);
    }

    input::placeholder { color: #c8bfb5; }

    .submit-btn {
      width: 100%;
      padding: 0.9rem;
      background: linear-gradient(135deg, var(--warm-brown) 0%, var(--bark) 100%);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.93rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
      position: relative;
    }

    .submit-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.08), transparent);
      border-radius: inherit;
    }

    .submit-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(58,40,16,0.28);
    }

    .submit-btn:active { transform: translateY(0); }

    .back-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--amber-dark); }

    .back-arrow { font-size: 0.8rem; }
  </style>
</head>
<body>

  <div class="card">
    <a class="brand" href="/">
      <span class="brand-icon">🌿</span>
      <span class="brand-name">MealPrepperFriend</span>
    </a>

    <div class="icon-wrap">✉️</div>
    <div class="form-eyebrow">Account recovery</div>
    <h1>Forgot your<br>password?</h1>
    <p class="subtitle">No worries. Enter your email and we'll send you a link to get back in.</p>

    <form method="POST" action="/forgot-password">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

      <label for="email">Email address</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required>

      <button type="submit" class="submit-btn">Send reset link →</button>
    </form>

    <a href="/login" class="back-link">
      <span class="back-arrow">←</span> Back to login
    </a>
  </div>

</body>
</html>
