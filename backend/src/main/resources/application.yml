spring:
  datasource:
    url: jdbc:mysql://localhost:3306/mealprepperfriend
    username: root
    password: yourpassword
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

server:
  port: 8080
